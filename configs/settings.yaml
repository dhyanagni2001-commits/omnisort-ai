watch_folders:
  - ~/Downloads
  - ~/Desktop
  - ~/Documents
output_folder: ~/Downloads/OmniSort
tesseract_path: /usr/local/bin/tesseract
text_model: sentence-transformers/all-MiniLM-L6-v2
api_host: 127.0.0.1
api_port: 8000
log_file: omnisort.log
file_ready_timeout: 30

categories:
  - Photos
  - Screenshots
  - Documents
  - Invoices
  - Resumes
  - Legal
  - Videos
  - Audio
  - Archives
  - Other
